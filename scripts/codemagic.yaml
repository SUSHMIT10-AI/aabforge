workflows:
  build-native-aab:
    name: Build Native Android AAB from URL
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
      vars:
        APP_URL: $APP_URL
        APP_NAME: $APP_NAME
        PACKAGE_NAME: $PACKAGE_NAME
        VERSION_NAME: $VERSION_NAME
        VERSION_CODE: $VERSION_CODE
        THEME_COLOR: $THEME_COLOR
        SPLASH_COLOR: $SPLASH_COLOR
        NAV_COLOR: $NAV_COLOR
        ORIENTATION: $ORIENTATION
        ADMOB_APP_ID: $ADMOB_APP_ID
        ADMOB_BANNER_ID: $ADMOB_BANNER_ID
        ADMOB_INTERSTITIAL_ID: $ADMOB_INTERSTITIAL_ID
        ADMOB_REWARDED_ID: $ADMOB_REWARDED_ID
        ENABLE_BILLING: $ENABLE_BILLING
        ICON_URL: $ICON_URL
      groups:
        - keystore_credentials

    scripts:
      - name: Debug repo layout
        script: |
          set -e
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          ls -la "$CM_BUILD_DIR"
          echo "--- scripts/ ---"
          ls -la "$CM_BUILD_DIR/scripts" || echo "scripts/ MISSING"
          echo "--- scripts/android-template ---"
          ls -la "$CM_BUILD_DIR/scripts/android-template" || echo "android-template MISSING"

      - name: Copy template
        script: |
          set -e
          SRC="$CM_BUILD_DIR/scripts/android-template"
          DEST="$CM_BUILD_DIR/android"
          if [ ! -d "$SRC" ]; then
            echo "ERROR: $SRC not found. Make sure scripts/android-template/ is committed to the repo."
            exit 1
          fi
          rm -rf "$DEST"
          cp -R "$SRC" "$DEST"
          chmod +x "$DEST/gradlew" || echo "WARN: gradlew not present yet — will generate."

      - name: Ensure Gradle wrapper exists
        script: |
          set -e
          cd "$CM_BUILD_DIR/android"
          if [ ! -f "gradlew" ] || [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Gradle wrapper missing — generating with system gradle..."
            brew list gradle >/dev/null 2>&1 || brew install gradle
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Decode keystore
        script: |
          set -e
          if [ -z "$CM_KEYSTORE" ]; then
            echo "ERROR: CM_KEYSTORE env var is empty. Add it to the keystore_credentials group."
            exit 1
          fi
          echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/android/release.keystore"
          ls -la "$CM_BUILD_DIR/android/release.keystore"

      - name: Download app icon
        script: |
          set -e
          RES="$CM_BUILD_DIR/android/app/src/main/res"
          if [ -n "$ICON_URL" ]; then
            for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
              density="${entry%%:*}"
              mkdir -p "$RES/mipmap-$density"
              curl -sL "$ICON_URL" -o "$RES/mipmap-$density/ic_launcher.png" || echo "icon download failed for $density"
            done
          else
            echo "No ICON_URL provided — using def
