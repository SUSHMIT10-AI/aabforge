workflows:
  aabforge:
    name: Build Native Android AAB from URL
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
      vars:
        APP_URL: $APP_URL
        APP_NAME: $APP_NAME
        PACKAGE_NAME: $PACKAGE_NAME
        VERSION_NAME: $VERSION_NAME
        VERSION_CODE: $VERSION_CODE
        THEME_COLOR: $THEME_COLOR
        SPLASH_COLOR: $SPLASH_COLOR
        NAV_COLOR: $NAV_COLOR
        ORIENTATION: $ORIENTATION
        ADMOB_APP_ID: $ADMOB_APP_ID
        ADMOB_BANNER_ID: $ADMOB_BANNER_ID
        ADMOB_INTERSTITIAL_ID: $ADMOB_INTERSTITIAL_ID
        ADMOB_REWARDED_ID: $ADMOB_REWARDED_ID
        ENABLE_BILLING: $ENABLE_BILLING
        ICON_URL: $ICON_URL
      groups:
        - keystore_credentials

    scripts:
      - name: Debug repo layout
        script: |
          set -e
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          ls -la "$CM_BUILD_DIR"

      - name: Copy template
        script: |
          set -e
          # Template lives at repo root: android-template/
          SRC="$CM_BUILD_DIR/android-template"
          DEST="$CM_BUILD_DIR/android"
          if [ ! -d "$SRC" ]; then
            echo "ERROR: $SRC not found."
            exit 1
          fi
          rm -rf "$DEST"
          cp -R "$SRC" "$DEST"
          chmod +x "$DEST/gradlew" 2>/dev/null || echo "gradlew not present yet — will generate."

      - name: Replace placeholders
        script: |
          set -e
          cd "$CM_BUILD_DIR/android"
          # Use perl for safe in-place replace across all source files
          find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" -o -name "*.kt" -o -name "*.properties" \) -print0 | \
          while IFS= read -r -d '' f; do
            perl -pi -e "s|__APP_URL__|${APP_URL}|g; \
                         s|__APP_NAME__|${APP_NAME}|g; \
                         s|__PACKAGE_NAME__|${PACKAGE_NAME}|g; \
                         s|__VERSION_NAME__|${VERSION_NAME}|g; \
                         s|__VERSION_CODE__|${VERSION_CODE}|g; \
                         s|__THEME_COLOR__|${THEME_COLOR}|g; \
                         s|__SPLASH_COLOR__|${SPLASH_COLOR}|g; \
                         s|__NAV_COLOR__|${NAV_COLOR}|g; \
                         s|__ORIENTATION__|${ORIENTATION}|g; \
                         s|__ADMOB_APP_ID__|${ADMOB_APP_ID}|g; \
                         s|__ADMOB_BANNER_ID__|${ADMOB_BANNER_ID}|g; \
                         s|__ADMOB_INTERSTITIAL_ID__|${ADMOB_INTERSTITIAL_ID}|g; \
                         s|__ADMOB_REWARDED_ID__|${ADMOB_REWARDED_ID}|g; \
                         s|__ENABLE_BILLING__|${ENABLE_BILLING}|g" "$f"
          done

      - name: Ensure Gradle wrapper exists
        script: |
          set -e
          cd "$CM_BUILD_DIR/android"
          if [ ! -f "gradlew" ] || [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Gradle wrapper missing — generating..."
            brew list gradle >/dev/null 2>&1 || brew install gradle
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Decode keystore
        script: |
          set -e
          if [ -z "$CM_KEYSTORE" ]; then
            echo "ERROR: CM_KEYSTORE empty. Add it to keystore_credentials group."
            exit 1
          fi
          echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/android/release.keystore"
          ls -la "$CM_BUILD_DIR/android/release.keystore"

      - name: Download app icon
        script: |
          set -e
          RES="$CM_BUILD_DIR/android/app/src/main/res"
          if [ -n "$ICON_URL" ]; then
            for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
              density="${entry%%:*}"
              mkdir -p "$RES/mipmap-$density"
              curl -sL "$ICON_URL" -o "$RES/mipmap-$density/ic_launcher.png" || echo "icon download failed for $density"
            done
          else
            echo "No ICON_URL provided — using default launcher icon from template."
          fi

      - name: Build AAB and APK
        script: |
          set -e
          cd "$CM_BUILD_DIR/android"
          ./gradlew clean
          ./gradlew bundleRelease assembleRelease \
            -PRELEASE_STORE_FILE="$CM_BUILD_DIR/android/release.keystore" \
            -PRELEASE_STORE_PASSWORD="$CM_KEYSTORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$CM_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$CM_KEY_PASSWORD"

      - name: Verify outputs
        script: |
          set -e
          AAB=$(find "$CM_BUILD_DIR/android/app/build/outputs/bundle/release" -name "*.aab" | head -n 1)
          APK=$(find "$CM_BUILD_DIR/android/app/build/outputs/apk/release" -name "*.apk" | head -n 1)
          echo "AAB: $AAB ($(du -h "$AAB" | cut -f1))"
          echo "APK: $APK ($(du -h "$APK" | cut -f1))"
          # Sanity check — real AAB must be > 500KB
          SIZE=$(stat -f%z "$AAB" 2>/dev/null || stat -c%s "$AAB")
          if [ "$SIZE" -lt 500000 ]; then
            echo "ERROR: AAB suspiciously small ($SIZE bytes). Build likely failed."
            exit 1
          fi

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/**/mapping.txt

    publishing:
      scripts:
        - name: Notify Lovable backend
          script: |
            echo "Build complete for BUILD_ID=$BUILD_ID"
